<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquaria AI — Admin</title>
  <link rel="icon" type="image/jpeg" href="assets/icon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 0; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,.08); max-width: 360px; width: 100%; }
    .login-box h2 { margin-bottom: 20px; font-size: 1.3rem; }
    .login-box input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: .95rem; margin-bottom: 12px; font-family: inherit; }
    .login-box button { width: 100%; padding: 10px; background: #1FA2A8; color: #fff; border: none; border-radius: 8px; font-size: .95rem; cursor: pointer; font-family: inherit; }
    .login-box button:hover { background: #178b90; }
    .login-box .error { color: #d33; font-size: .85rem; margin-top: 8px; display: none; }

    .admin { display: none; }
    .admin.active { display: block; }
    .topbar { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar button { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: .85rem; }
    .topbar button:hover { background: rgba(255,255,255,.25); }

    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; padding: 0 24px; background: #fff; }
    .tab { padding: 12px 20px; cursor: pointer; font-weight: 500; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
    .tab:hover { color: #1FA2A8; }
    .tab.active { color: #1FA2A8; border-bottom-color: #1FA2A8; }
    .tab .count { background: #1FA2A8; color: #fff; font-size: .75rem; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }

    .content { max-width: 960px; margin: 24px auto; padding: 0 24px; }
    .panel { display: none; }
    .panel.active { display: block; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    th { background: #f0f2f5; text-align: left; padding: 12px 16px; font-size: .85rem; font-weight: 600; color: #555; }
    td { padding: 12px 16px; border-top: 1px solid #eee; font-size: .9rem; }
    tr:hover td { background: #f9fafb; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .refresh-btn { background: #1FA2A8; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; margin-bottom: 16px; font-size: .85rem; }
    .refresh-btn:hover { background: #178b90; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h2>Aquaria Admin</h2>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button onclick="doLogin()">Sign In</button>
      <div id="login-error" class="error">Invalid credentials</div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin" class="admin">
    <div class="topbar">
      <h1>Aquaria Admin</h1>
      <button onclick="doLogout()">Sign Out</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="beta">Beta Signups <span id="beta-count" class="count">0</span></div>
      <div class="tab" data-tab="contact">Contact Messages <span id="contact-count" class="count">0</span></div>
    </div>
    <div class="content">
      <div id="beta-panel" class="panel active">
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
        <table>
          <thead><tr><th>#</th><th>Email</th><th>Date</th></tr></thead>
          <tbody id="beta-body"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
      <div id="contact-panel" class="panel">
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
        <table>
          <thead><tr><th>#</th><th>Email</th><th>Message</th><th>Date</th></tr></thead>
          <tbody id="contact-body"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
  var SB = 'https://jdiwsvealnrzdxofomvz.supabase.co';
  var token = '';

  // Tabs
  document.querySelectorAll('.tab').forEach(function(t) {
    t.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById(t.dataset.tab + '-panel').classList.add('active');
    });
  });

  function doLogin() {
    var email = document.getElementById('login-email').value;
    var pw = document.getElementById('login-password').value;
    fetch(SB + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkaXdzdmVhbG5yemR4b2ZvbXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODgyODgsImV4cCI6MjA4ODQ2NDI4OH0.NzNg9zyrqjzGNbjJRZN6oApu3e4xZY75Vq-SfocvGLk',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email: email, password: pw })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.access_token) {
        token = d.access_token;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin').classList.add('active');
        loadData();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }).catch(function() {
      document.getElementById('login-error').style.display = 'block';
    });
  }

  function doLogout() {
    token = '';
    document.getElementById('admin').classList.remove('active');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-error').style.display = 'none';
  }

  function sbGet(table) {
    return fetch(SB + '/rest/v1/' + table + '?select=*&order=created_at.desc', {
      headers: {
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkaXdzdmVhbG5yemR4b2ZvbXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODgyODgsImV4cCI6MjA4ODQ2NDI4OH0.NzNg9zyrqjzGNbjJRZN6oApu3e4xZY75Vq-SfocvGLk',
        'Authorization': 'Bearer ' + token
      }
    }).then(function(r) { return r.json(); });
  }

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function loadData() {
    sbGet('beta_signups').then(function(rows) {
      document.getElementById('beta-count').textContent = rows.length;
      var tb = document.getElementById('beta-body');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">No signups yet</td></tr>'; return; }
      tb.innerHTML = rows.map(function(r, i) {
        return '<tr><td>' + (i + 1) + '</td><td>' + esc(r.email) + '</td><td>' + fmtDate(r.created_at) + '</td></tr>';
      }).join('');
    });
    sbGet('contact_submissions').then(function(rows) {
      document.getElementById('contact-count').textContent = rows.length;
      var tb = document.getElementById('contact-body');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="4" class="empty">No messages yet</td></tr>'; return; }
      tb.innerHTML = rows.map(function(r, i) {
        return '<tr><td>' + (i + 1) + '</td><td>' + esc(r.email) + '</td><td>' + esc(r.message) + '</td><td>' + fmtDate(r.created_at) + '</td></tr>';
      }).join('');
    });
  }

  // Enter key support
  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  </script>
</body>
</html>
