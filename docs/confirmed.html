<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — Aquaria AI</title>
  <link rel="icon" type="image/jpeg" href="assets/icon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      color: #0E5A66;
      background: #f8fffe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(14, 90, 102, 0.1);
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .logo { width: 140px; margin-bottom: 24px; }
    .icon {
      width: 56px;
      height: 56px;
      background: #D9F7F0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .icon svg { width: 28px; height: 28px; fill: #1FA2A8; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #64748b; font-size: 1rem; line-height: 1.6; margin-bottom: 8px; }
    .highlight { color: #1FA2A8; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/fulllogo.jpg" alt="Aquaria AI" class="logo">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <h1>Email Confirmed</h1>
    <p>Your email address has been verified successfully.</p>
    <p>You can now <span class="highlight">return to the Aquaria app</span> and sign in with your account.</p>
  </div>
</body>
</html>
